<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!-- Status bar tint; must match --surface in global.css (the topbar color).
         Static media variants so iOS picks the right one before JS runs. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0f0f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#181818" />
    <script>
      // Resolve the theme before first paint: iOS Safari samples the canvas
      // color for its chrome early, and a light-first paint would stick.
      // Must mirror applyTheme() in src/app/context.tsx.
      (function () {
        var dark = false;
        try {
          var stored = localStorage.getItem("sing-box-dashboard.theme");
          dark =
            stored === "dark" ||
            (stored !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        } catch (e) {}
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
      // Resolve the language before first paint so Farsi gets dir="rtl"
      // without a layout flash. Must mirror detectSystemLanguage() in
      // src/app/i18n.tsx (storage key and tag mapping).
      (function () {
        var lang = "en";
        try {
          var stored = localStorage.getItem("sing-box-dashboard.language");
          var known = ["en", "zh-Hans", "zh-Hant", "fa", "ru"];
          if (known.indexOf(stored) !== -1) {
            lang = stored;
          } else {
            var tags = navigator.languages || [navigator.language];
            for (var i = 0; i < tags.length; i++) {
              var tag = String(tags[i]).toLowerCase();
              if (tag.indexOf("zh") === 0) {
                lang = /hant|tw|hk|mo/.test(tag) ? "zh-Hant" : "zh-Hans";
                break;
              }
              if (tag.indexOf("fa") === 0) {
                lang = "fa";
                break;
              }
              if (tag.indexOf("ru") === 0) {
                lang = "ru";
                break;
              }
              if (tag.indexOf("en") === 0) {
                break;
              }
            }
          }
        } catch (e) {}
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === "fa" ? "rtl" : "ltr";
      })();
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%231a1a1a'/%3E%3Cpath d='m12 5 6 3.5v7L12 19l-6-3.5v-7L12 5Zm0 2.3-4 2.3v4.7l4 2.3 4-2.3V9.6l-4-2.3Z' fill='%23fafafa'/%3E%3C/svg%3E"
    />
    <title>sing-box dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
